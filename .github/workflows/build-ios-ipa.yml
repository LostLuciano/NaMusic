name: Build iOS IPA

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        lfs: true
    
    - name: Select Xcode version
      run: |
        sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
        xcodebuild -version
    
    - name: Install dependencies
      run: |
        if [ -f "Podfile" ]; then
          pod install --repo-update
        fi
    
    - name: Validate Xcode project
      run: |
        python3 scripts/validate_pbxproj.py
        if [ $? -ne 0 ]; then
          echo "❌ Project validation failed"
          exit 1
        fi
    
    - name: Clean build folder
      run: |
        rm -rf build/
        rm -rf ~/Library/Developer/Xcode/DerivedData/*MusicXNA*
    
    - name: Build for iOS (Release)
      run: |
        xcodebuild clean build \
          -project MusicXNA.xcodeproj \
          -scheme MusicXNA \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -archivePath build/MusicXNA.xcarchive \
          -derivedDataPath build/DerivedData \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          DEVELOPMENT_TEAM="" \
          PROVISIONING_PROFILE="" \
          PROVISIONING_PROFILE_SPECIFIER="" \
          IPHONEOS_DEPLOYMENT_TARGET=18.0 \
          SWIFT_VERSION=5.0 \
          SUPPORTED_PLATFORMS="iphoneos iphonesimulator" \
          2>&1 | tee build.log
        
        BUILD_EXIT=${PIPESTATUS[0]}
        if [ $BUILD_EXIT -ne 0 ]; then
          echo "❌ Build failed with exit code $BUILD_EXIT"
          tail -100 build.log
          exit $BUILD_EXIT
        fi
    
    - name: Archive iOS app
      if: success()
      run: |
        xcodebuild \
          -project MusicXNA.xcodeproj \
          -scheme MusicXNA \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -archivePath build/MusicXNA.xcarchive \
          archive \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          DEVELOPMENT_TEAM=""
    
    - name: Export unsigned IPA
      if: success()
      run: |
        mkdir -p build/output
        
        # Use exportOptions-unsigned.plist for unsigned export
        xcodebuild \
          -exportArchive \
          -archivePath build/MusicXNA.xcarchive \
          -exportPath build/output \
          -exportOptionsPlist Runner/ExportOptions-unsigned.plist \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO
    
    - name: Create unsigned app bundle
      if: success()
      run: |
        # If IPA export fails, try extracting app from archive
        if [ ! -f "build/output/MusicXNA.ipa" ]; then
          echo "📦 Creating app bundle from archive..."
          mkdir -p build/output
          
          # Extract app from archive
          cd build/MusicXNA.xcarchive/Products/Applications
          zip -r ../../output/MusicXNA.app.zip MusicXNA.app
          cd ../../../../../../
          
          # Rename to .ipa for distribution
          if [ -f "build/output/MusicXNA.app.zip" ]; then
            mv build/output/MusicXNA.app.zip build/output/MusicXNA.ipa
            echo "✅ Created MusicXNA.ipa (app bundle)"
          fi
        fi
    
    - name: List output files
      if: success()
      run: |
        echo "📂 Build artifacts:"
        ls -lah build/output/
        du -sh build/output/*
    
    - name: Upload IPA artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: MusicXNA-unsigned
        path: build/output/
        retention-days: 30
    
    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        retention-days: 7
    
    - name: Summary
      if: always()
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Project:** MusicXNA" >> $GITHUB_STEP_SUMMARY
        echo "**Platform:** iOS (unsigned)" >> $GITHUB_STEP_SUMMARY
        echo "**Deployment Target:** iOS 18.0+" >> $GITHUB_STEP_SUMMARY
        echo "**Build Configuration:** Release" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ -f "build/output/MusicXNA.ipa" ]; then
          SIZE=$(du -h build/output/MusicXNA.ipa | cut -f1)
          echo "✅ **Status:** Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "📦 **Output:** MusicXNA.ipa ($SIZE)" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Status:** Build Failed" >> $GITHUB_STEP_SUMMARY
        fi
